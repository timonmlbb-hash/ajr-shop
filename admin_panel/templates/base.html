<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Formachi Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --accent: #00e5a0;
      --accent2: #7b5cf0;
      --danger: #ff4757;
      --warning: #ffa502;
      --text: #e8e8f0;
      --text-muted: #6b6b85;
      --sidebar-w: 240px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
    }
    .sidebar-logo .sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .nav { flex: 1; padding: 16px 12px; }
    .nav-section-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-muted); padding: 8px 12px 6px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: var(--text-muted); text-decoration: none;
      font-size: 13.5px; font-weight: 500;
      transition: all 0.15s; margin-bottom: 2px;
    }
    .nav a:hover { background: var(--surface2); color: var(--text); }
    .nav a.active { background: rgba(0,229,160,0.1); color: var(--accent); }
    .nav a .icon { width: 18px; text-align: center; font-size: 15px; }
    .nav a .badge {
      margin-left: auto; background: var(--danger);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px; font-family: 'IBM Plex Mono', monospace;
    }
    .sidebar-footer {
      padding: 16px 12px; border-top: 1px solid var(--border);
    }
    .sidebar-footer a {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); text-decoration: none; font-size: 13px;
      padding: 8px 12px; border-radius: 8px; transition: all 0.15s;
    }
    .sidebar-footer a:hover { color: var(--danger); background: rgba(255,71,87,0.08); }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); }
    .topbar .meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .content { padding: 32px; flex: 1; }

    /* CARDS */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent);
    }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.purple::before { background: var(--accent2); }
    .stat-card.warning::before { background: var(--warning); }
    .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--text); margin-top: 6px; line-height: 1; }
    .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 24px; opacity: 0.3; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13.5px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
    }
    .badge-pending { background: rgba(255,165,2,0.12); color: var(--warning); border: 1px solid rgba(255,165,2,0.2); }
    .badge-confirmed { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
    .badge-delivering { background: rgba(123,92,240,0.1); color: var(--accent2); border: 1px solid rgba(123,92,240,0.2); }
    .badge-done { background: rgba(0,229,160,0.06); color: #5cb85c; border: 1px solid rgba(92,184,92,0.2); }
    .badge-cancelled { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer;
      font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #00c88a; transform: translateY(-1px); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(255,71,87,0.1); color: var(--danger); border: 1px solid rgba(255,71,87,0.2); }
    .btn-danger:hover { background: rgba(255,71,87,0.2); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* FORM */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
    input, select, textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-family: 'Manrope', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: var(--surface2); }

    /* ALERT */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; }
    .alert-success { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); color: var(--accent); }
    .alert-danger { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2); color: var(--danger); }

    /* UTILS */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .text-muted { color: var(--text-muted); font-size: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">⚽ Formachi</div>
      <div class="sub">Admin Panel</div>
    </div>
    <nav class="nav">
      <div class="nav-section-label">Asosiy</div>
      <a href="/admin" class="{% if request.url.path == '/admin' %}active{% endif %}">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="/admin/orders" class="{% if 'orders' in request.url.path %}active{% endif %}">
        <span class="icon">📦</span> Buyurtmalar
      </a>
      <div class="nav-section-label" style="margin-top:12px">Katalog</div>
      <a href="/admin/products" class="{% if 'products' in request.url.path %}active{% endif %}">
        <span class="icon">👕</span> Mahsulotlar
      </a>
      <a href="/admin/categories" class="{% if 'categories' in request.url.path %}active{% endif %}">
        <span class="icon">📂</span> Kategoriyalar
      </a>
      <a href="/admin/stock" class="{% if 'stock' in request.url.path %}active{% endif %}">
        <span class="icon">📦</span> Ombor
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout">🚪 Chiqish</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>{% block page_title %}Dashboard{% endblock %}</h1>
      <div class="meta">Formachi.uz © 2024</div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
