<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formachi — Kirish</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #00e5a0; --danger: #ff4757; --bg: #0a0a0f; --surface: #111118; --border: #2a2a3a; --text: #e8e8f0; --muted: #6b6b85; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(0,229,160,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(123,92,240,0.04) 0%, transparent 50%);
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 24px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo .brand { font-family: 'Bebas Neue'; font-size: 48px; letter-spacing: 4px; color: var(--accent); }
    .logo .sub { font-family: 'IBM Plex Mono'; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
    label { display: block; font-family: 'IBM Plex Mono'; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    input[type=password] {
      width: 100%; background: #0a0a0f; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px; color: var(--text);
      font-family: 'IBM Plex Mono'; font-size: 16px; letter-spacing: 4px;
      outline: none; transition: border-color 0.2s;
    }
    input[type=password]:focus { border-color: var(--accent); }
    .btn {
      width: 100%; margin-top: 20px; background: var(--accent); color: #000;
      border: none; border-radius: 8px; padding: 13px;
      font-family: 'Manrope'; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
    }
    .btn:hover { background: #00c88a; transform: translateY(-1px); }
    .error { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2); color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <div class="brand">⚽ FORMACHI</div>
      <div class="sub">Admin Panel</div>
    </div>
    <div class="card">
      <h2>🔐 Kirish</h2>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <div style="margin-bottom: 20px;">
          <label>Parol</label>
          <input type="password" name="password" placeholder="••••••••" autofocus required>
        </div>
        <button type="submit" class="btn">Kirish →</button>
      </form>
    </div>
  </div>
</body>
</html>
